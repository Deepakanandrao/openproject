      blankslate:
        description: Set up a synchronization to mirror your LDAP organizational unit structure into the OpenProject department hierarchy.
        heading: No LDAP department synchronizations
      destroy:
        confirmation: If you continue, the synchronization %{name} is removed and its %{departments_count} departments are no longer managed by LDAP.
        heading: Remove synchronization %{name}?
        info: The departments and their members are kept and become regular departments. You can edit or delete them manually afterwards under Administration → Users and permissions → Organization.
        title: Remove synchronization %{name}
      form:
        auth_source_text: Select which LDAP connection should be used.
        base_dn_text: 'Enter the base DN whose organizational units should be synchronized. Its direct child OUs become top-level departments. It must be below the base DN of the selected LDAP connection.

          '
        guid_attribute_text: 'Optional. The LDAP attribute holding a stable unique identifier (e.g. "objectGUID" or "entryUUID"). When set, departments survive OU renames and moves. Leave empty to match by DN.

          '
        ou_name_attribute_text: The LDAP attribute used to name the department (e.g. "ou").
        sections:
          connection: LDAP connection
          structure: Organizational units
          users: 用户
        structure_filter_string_text: RFC4515 LDAP 筛选器，用于识别组织单元条目。
        sync_users_text: 'If enabled, users found below the base DN are also created in OpenProject. Without it, only existing accounts are assigned to departments.

          '
        user_filter_string_text: 'Optional RFC4515 LDAP filter identifying user entries. Leave empty to use the connection filter, or a generic person filter when none is set.

          '
      help_text: 'This module mirrors the organizational unit (OU) structure of your LDAP directory into the OpenProject department hierarchy. Each OU below the configured base DN becomes a department, and users are assigned to the department of the OU they reside in. Departments are synchronized regularly through a cron job.

        '
