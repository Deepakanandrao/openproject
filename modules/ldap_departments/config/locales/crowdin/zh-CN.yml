        description: 运行同步，将此基本 DN 的组织单元导入为部门。
        heading: 尚未同步任何部门
      destroy:
        confirmation: 如果继续，%{name} 将不再通过 LDAP 同步进行管理。
        heading: 是否停止管理 %{name}？
        info: 该部门及其成员将被保留。它将成为一个常规部门，您可以手动编辑或删除。
